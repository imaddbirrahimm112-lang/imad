<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income PRO • Rocket Edition</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    body {
        margin: 0; font-family: 'Segoe UI', system-ui, Arial, sans-serif;
        background: linear-gradient(135deg, #0a1625, #1e40af);
        background-size: 400% 400%;
        animation: gradientMove 25s ease infinite;
        color: white; min-height: 100vh;
    }
    .container {
        backdrop-filter: blur(40px); background: rgba(255,255,255,0.09);
        padding: 25px; border-radius: 30px; width: 92%; max-width: 440px;
        margin: 30px auto; border: 1px solid rgba(147,197,253,0.4);
        box-shadow: 0 25px 50px rgba(30,64,175,0.35);
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header h1 { margin: 0; font-size: 1.8em; background: linear-gradient(90deg,#60a5fa,#a5f3fc); -webkit-background-clip: text; color: transparent; }

    button, .fab {
        position: relative; overflow: hidden;
    }
    button:active::after, .fab:active::after {
        content: ''; position: absolute; top: 50%; left: 50%;
        width: 30px; height: 30px; background: rgba(255,255,255,0.8);
        border-radius: 50%; animation: ripple 0.6s linear;
        transform: translate(-50%, -50%);
    }

    .toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #10b981; color: white; padding: 14px 24px; border-radius: 9999px;
        box-shadow: 0 10px 30px rgba(16,185,129,0.4); z-index: 10000;
        display: none; align-items: center; gap: 10px;
    }
    .fab {
        position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
        background: linear-gradient(90deg,#3b82f6,#60a5fa); border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 28px;
        box-shadow: 0 10px 30px rgba(59,130,246,0.5); z-index: 9999;
    }
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>🚀 Income PRO</h1>
        <span onclick="openSettings()" style="font-size:32px;cursor:pointer;">⚙️</span>
    </div>

    <div id="loginScreen">
        <h2>🔐 تسجيل الدخول</h2>
        <input id="email" placeholder="البريد الإلكتروني" type="email">
        <input id="password" type="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول / إنشاء حساب</button>
    </div>

    <div id="mainScreen" style="display:none;">
        <div style="text-align:center;margin-bottom:10px;">مرحباً، <span id="userEmail" style="color:#60a5fa;font-weight:bold"></span></div>

        <h2>💰 الإيرادات</h2>
        <input type="number" id="amount" placeholder="المبلغ" style="font-size:1.2em">
        <select id="currency"><option value="usd">دولار $</option><option value="syp">ليرة سورية</option></select>
        <input type="number" id="rate" placeholder="سعر الصرف" value="1">
        <select id="category">... (نفس الخيارات السابقة) ...</select>
        <input type="text" id="note" placeholder="ملاحظات">
        <input type="date" id="entryDate">

        <button onclick="add()" style="background:linear-gradient(90deg,#10b981,#34d399);margin-top:15px;font-size:1.1em">إضافة إيراد 🚀</button>

        <div id="stats" style="display:flex;gap:10px;margin:20px 0;justify-content:center"></div>

        <div id="list"></div>
        <canvas id="trendChart" height="180"></canvas>

        <div style="display:flex;gap:12px;margin-top:20px">
            <button onclick="pdf()" style="flex:1">📄 PDF ملكي</button>
            <button onclick="backup()" style="flex:1">💾 Backup</button>
        </div>
    </div>
</div>

<!-- زر Quick Add عائم -->
<div class="fab" onclick="quickAdd()">+</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- إعدادات (نفس السابق مع تحسينات) -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

const firebaseConfig = { apiKey: "AIzaSyACPVxprQrys1w-6Re_75UFISJ3Nm8r-D0", authDomain: "income-app-e6b07.firebaseapp.com", projectId: "income-app-e6b07" };
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;
let allData = [];
let trashData = JSON.parse(localStorage.getItem('trashData')) || [];
let currentEditId = null;
let chartInstance = null;

function showToast(msg, color = "#10b981") {
    const toast = document.getElementById('toast');
    toast.style.background = color;
    toast.textContent = msg;
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 3000);
}

window.login = async function() { ... /* نفس الكود السابق */ ... };

window.add = async function() {
    if (!currentUser) return showToast("❌ سجل الدخول أولاً", "#ef4444");
    const amount = Number(document.getElementById('amount').value);
    if (!amount || amount <= 0) return showToast("❌ أدخل مبلغ صحيح", "#ef4444");

    const currency = document.getElementById('currency').value;
    const rate = Number(document.getElementById('rate').value) || 1;
    const usd = currency === "usd" ? amount : amount / rate;
    const syp = currency === "syp" ? amount : amount * rate;

    const data = {
        usd: Number(usd.toFixed(2)),
        syp: Number(syp.toFixed(0)),
        category: document.getElementById('category').value || "اخرى",
        note: document.getElementById('note').value.trim(),
        uid: currentUser.uid,
        date: document.getElementById('entryDate').value ? new Date(document.getElementById('entryDate').value).toISOString() : new Date().toISOString()
    };

    try {
        if (currentEditId) {
            await updateDoc(doc(db, "income", currentEditId), data);
            currentEditId = null;
        } else {
            await addDoc(collection(db, "income"), data);
        }
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        load();

        // 🎉 صاروخي!
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        showToast("✅ تمت إضافة الإيراد بنجاح!", "#10b981");
    } catch (e) {
        console.error(e);
        showToast("❌ خطأ: " + e.message, "#ef4444");
    }
};

function render() { ... /* مع إضافة Line Chart للاتجاه */ ... }

window.quickAdd = function() {
    document.getElementById('amount').focus();
    showToast("أدخل المبلغ ثم اضغط إضافة 🚀", "#3b82f6");
};

</script>

</html>
