buildPdfBaseCss: function(){
  return `
  <style>
    .pdf-wrap{
      font-family:Arial,sans-serif;
      direction:rtl;
      background:#fff;
      color:#111;
      padding:10px 12px;
      width:287mm;
      min-height:200mm;
      margin:0 auto;
      overflow:hidden;
    }
    .pdf-title{
      text-align:center;
      font-size:22px;
      font-weight:700;
      color:#172554;
      margin:0 0 4px;
    }
    .pdf-sub{
      text-align:center;
      font-size:12px;
      color:#475569;
      margin:0 0 10px;
    }
    .pdf-badges{
      text-align:center;
      font-size:11px;
      color:#475569;
      margin:0 0 12px;
    }
    .pdf-cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .pdf-card{
      background:linear-gradient(135deg,#1e293b,#334155);
      color:#fff;
      border-radius:10px;
      padding:10px;
      text-align:center;
    }
    .pdf-card .k{
      font-size:10px;
      opacity:.86;
      margin-bottom:4px;
    }
    .pdf-card .v{
      font-size:16px;
      font-weight:700;
    }
    .pdf-table-center{
      width:78%;
      margin:0 auto 12px;
    }
    .pdf-box{
      border:1px solid #dbe3ef;
      border-radius:10px;
      padding:8px;
      background:#fff;
    }
    .pdf-box h3{
      margin:0 0 8px;
      font-size:13px;
      color:#1e3a8a;
      border-bottom:2px solid #c7d2fe;
      padding-bottom:5px;
    }
    .pdf-table{
      width:100%;
      border-collapse:collapse;
      font-size:11px;
    }
    .pdf-table th{
      background:#4f46e5;
      color:#fff;
      padding:7px;
      border:1px solid #4f46e5;
      text-align:right;
    }
    .pdf-table td{
      padding:6px;
      border:1px solid #dbe3ef;
      color:#111;
      vertical-align:top;
    }
    .pdf-table .center{
      text-align:center;
    }
    .pdf-table .money{
      font-weight:700;
      color:#0f172a;
    }
    .pdf-charts{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:12px;
    }
    .pdf-chart{
      border:1px solid #dbe3ef;
      border-radius:10px;
      padding:8px;
      text-align:center;
      background:#f8fafc;
    }
    .pdf-chart h4{
      font-size:12px;
      margin:0 0 6px;
      color:#1e3a8a;
    }
    .pdf-chart img{
      display:block;
      width:100%;
      height:180px;
      object-fit:contain;
    }
    .pdf-footer{
      text-align:center;
      color:#94a3b8;
      font-size:10px;
      margin-top:10px;
    }
  </style>`;
},
